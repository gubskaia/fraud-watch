server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: fraudwatch
    password: fraudwatch
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672

auth:
  jwt:
    issuer: fraudwatch-auth-service
    secret: ZmFrZS1mcmF1ZHdhdGNoLWRldi1zZWNyZXQtZmFrZS1mcmF1ZHdhdGNoLWRldi1zZWNyZXQ=
    access-token-ttl: PT15M
    refresh-token-ttl: P14D

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
