name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate monorepo
        run: ./mvnw -q validate

  service-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - services/api-gateway
          - services/auth-service
          - services/fraud-service
          - services/review-service
          - services/audit-service
          - services/notification-service
          - services/transaction-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run module tests
        run: ./mvnw -q -pl ${{ matrix.module }} -am test -Dsurefire.failIfNoSpecifiedTests=false

  compose-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose -f compose.yml config > /tmp/fraudwatch-compose-config.txt

  demo-and-observability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PowerShell demo script syntax
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content -Raw './scripts/demo/full-flow.ps1'),
            [ref]$errors
          ) > $null

          if ($errors) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Verify provisioned Grafana dashboard exists
        run: test -f infrastructure/grafana/dashboards/fraudwatch-overview.json
