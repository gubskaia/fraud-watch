name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate monorepo
        run: ./mvnw -q validate

  service-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - services/api-gateway
          - services/auth-service
          - services/fraud-service
          - services/review-service
          - services/audit-service
          - services/notification-service
          - services/transaction-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run module tests
        run: ./mvnw -q -pl ${{ matrix.module }} -am test -Dsurefire.failIfNoSpecifiedTests=false

  compose-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose -f compose.yml config > /tmp/fraudwatch-compose-config.txt
