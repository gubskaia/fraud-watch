name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate monorepo
        run: ./mvnw -q validate

  service-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - services/api-gateway
          - services/auth-service
          - services/fraud-service
          - services/review-service
          - services/audit-service
          - services/notification-service
          - services/transaction-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run module tests
        run: ./mvnw -q -pl ${{ matrix.module }} -am test -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/target/surefire-reports/**
            libs/**/target/surefire-reports/**
          if-no-files-found: ignore

  compose-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose -f compose.yml config > /tmp/fraudwatch-compose-config.txt

  demo-and-observability:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PowerShell scripts syntax
        shell: pwsh
        run: |
          $scripts = @(
            './scripts/demo/full-flow.ps1',
            './scripts/dev/smoke-check.ps1',
            './scripts/dev/clean-start.ps1'
          )

          foreach ($scriptPath in $scripts) {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize(
              (Get-Content -Raw $scriptPath),
              [ref]$errors
            ) > $null

            if ($errors) {
              Write-Host "Syntax errors found in $scriptPath"
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

      - name: Verify provisioned Grafana dashboard exists
        run: test -f infrastructure/grafana/dashboards/fraudwatch-overview.json

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - transaction-service
          - fraud-service
          - review-service
          - audit-service
          - notification-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          load: false
          tags: fraudwatch/${{ matrix.service }}:ci
